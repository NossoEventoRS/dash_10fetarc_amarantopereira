<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - 10º FETARC - CTG Amanto Pereira</title>
  <base target="_top">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    /* PALETA EM TONS DE VERDE */
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background-color: #f4efe5; 
      background-image: url('https://raw.githubusercontent.com/NossoEventoRS/Imagens/refs/heads/main/Fundo.png'); 
      background-size: cover; 
      background-position: center; 
      background-repeat: no-repeat; 
      background-attachment: fixed;
      margin: 0; 
      padding: 0; 
      color: #333; 
    }
    
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #139c01; border-radius: 5px; }

    #login-screen { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: linear-gradient(135deg, #139c01 0%, #0d6101 100%); 
      z-index: 9999; display: flex; 
      flex-direction: column; align-items: center; justify-content: center; 
    }
    
    .login-box { 
      background: white; padding: 35px; border-radius: 15px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.25); text-align: center; 
      width: 320px;
    }
    
    #dash-content { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    
    .header { 
      background-color: #139c01; color: white; padding: 18px; 
      text-align: center; font-size: 22px; font-weight: bold; 
      border-radius: 10px; margin-bottom: 15px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .filter-bar { 
      background: #0d6101; padding: 15px; border-radius: 8px; 
      display: flex; flex-wrap: wrap; gap: 12px; 
      justify-content: center; margin-bottom: 20px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .filter-group { display: flex; flex-direction: column; }
    .filter-group label { color: white; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
    .filter-group select { border-radius: 4px; border: 1px solid #ccc; font-size: 12px; height: 30px; padding: 0 5px; outline: none; }
    .filter-group select:focus { border: 2px solid #27ae60; }

    .kpi-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 25px; }
    .kpi-card { 
      width: 190px; background: white; padding: 15px; border-radius: 8px; 
      text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.08); 
      border-top: 4px solid #139c01;
    }
    .kpi-val { font-size: 26px; font-weight: bold; margin-top: 5px; color: #111; }

    .charts-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); 
      gap: 15px; 
      margin-bottom: 25px;
    }
    .chart-box { 
      background: white; padding: 15px; border-radius: 8px; 
      height: 200px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); 
      box-sizing: border-box;
    }

    .btn-action { height: 30px; width: 85px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; margin: 5px; color: white; transition: 0.2s; }
    .btn-filtrar { background: #27ae60; }
    .btn-filtrar:hover { background: #219653; transform: scale(1.03); }
    .btn-limpar { background: #e74c3c; }
    .btn-limpar:hover { background: #c0392b; transform: scale(1.03); }
    
    .btn-sair { 
      background: #139c01; color: white; padding: 12px 45px; 
      border: none; cursor: pointer; font-weight: bold; 
      border-radius: 8px; display: inline-block; margin-top: 10px; 
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn-sair:hover { background: #0d6101; transform: scale(1.02); }
    #loading-msg { color: #139c01; font-size: 13px; display: none; margin-top: 12px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <img src="https://raw.githubusercontent.com/NossoEventoRS/10fetarc_amarantopereira/refs/heads/main/Banner10.png" 
           style="width: 220px; margin-bottom: 15px; border-radius: 8px;" alt="Logo 10º FETARC">
      
      <h2 style="color: #0d6101; margin: 0 0 15px 0; font-size: 16px;">Dashboard de Inscrições<br>10º FETARC</h2>
      
      <input type="password" id="input_senha" onkeypress="if(event.key==='Enter') tentarAcesso()" 
             placeholder="Digite a senha de acesso..." 
             style="padding: 12px; width: 90%; border-radius: 6px; border: 1px solid #ccc; text-align: center; font-size: 14px;">
      <br><br>
      
      <button class="btn-action btn-filtrar" style="width: 100%; height: 42px; font-size: 14px;" onclick="tentarAcesso()">ACESSAR PAINEL</button>
      <p id="loading-msg">Carregando informações...</p>
      <p id="msg_erro" style="color: red; font-size: 12px; display: none; margin-top: 10px; font-weight: bold;">Senha incorreta!</p>
    </div>
  </div>

  <div id="dash-content">
    <div class="header">PAINEL DE CONTROLE - 10º FETARC - CTG Amanto Pereira (2026)</div>
    
    <div class="filter-bar">
      <div class="filter-group"><label>Modalidade</label><select id="f_mod" style="width: 180px;"></select></div>
      <div class="filter-group"><label>Categoria</label><select id="f_cat" style="width: 150px;"></select></div>
      <div class="filter-group"><label>Entidade</label><select id="f_ent" style="width: 220px;"></select></div>
      <div class="filter-group"><label>Cidade</label><select id="f_cid" style="width: 180px;"></select></div>
      <div class="filter-group"><label>RT</label><select id="f_rt" style="width: 100px;"></select></div>
      <div class="filter-group"><label>Status</label><select id="f_status" style="width: 110px;"></select></div>
      <div style="align-self: flex-end;">
        <button class="btn-action btn-filtrar" onclick="atualizarGraficos()">Filtrar</button>
        <button class="btn-action btn-limpar" onclick="limparFiltros()">Limpar</button>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card"><b>Total Inscrições</b><div id="kpi_total" class="kpi-val">0</div></div>
      <div class="kpi-card"><b>Qtd Entidades</b><div id="kpi_ent" class="kpi-val">0</div></div>
      <div class="kpi-card"><b>Confirmados</b><div id="kpi_conf" class="kpi-val" style="color: #2e7d32;">0</div></div>
      <div class="kpi-card"><b>Lista de Espera</b><div id="kpi_esp" class="kpi-val" style="color: #c0392b;">0</div></div>
      <div class="kpi-card"><b>Suplentes</b><div id="kpi_sup" class="kpi-val" style="color: #d35400;">0</div></div>
    </div>

    <div class="charts-grid">
      <div id="g_declamacao" class="chart-box"></div>
      <div id="g_vocal" class="chart-box"></div>
      <div id="g_tradicional" class="chart-box"></div>
      <div id="g_grupo" class="chart-box"></div> 
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
      <button class="btn-sair" onclick="logout()">Sair do Painel</button>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzhe9sfjJRf6R7riwf5lVjxSKP6CsgWz6pq_ulDMBsUGVqINxxK6yfURj7vyXYN6-0Q/exec"; 
    google.charts.load('current', {'packages':['corechart'], 'language': 'pt-BR'});
    var DADOS_GLOBAIS = [];

    async function tentarAcesso() {
      const senha = document.getElementById('input_senha').value;
      const msgErro = document.getElementById('msg_erro');
      const loading = document.getElementById('loading-msg');
      
      msgErro.style.display = 'none';
      loading.style.display = 'block';

      try {
        const response = await fetch(`${WEB_APP_URL}?p=${encodeURIComponent(senha)}`);
        const res = await response.json();

        if (res.erro) {
          loading.style.display = 'none';
          msgErro.style.display = 'block';
        } else {
          DADOS_GLOBAIS = res;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dash-content').style.display = 'block';
          popularFiltros();
          atualizarGraficos();
        }
      } catch (e) {
        loading.style.display = 'none';
        alert("Erro ao conectar com o banco de dados. Verifique o seu Script.");
      }
    }

    function logout() {
      document.getElementById('input_senha').value = "";
      document.getElementById('msg_erro').style.display = 'none';
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('dash-content').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    function popularFiltros() {
      var f = (id, campo) => {
        var itens = [...new Set(DADOS_GLOBAIS.map(d => d[campo]))].sort();
        var s = document.getElementById(id);
        s.innerHTML = '<option value="">Todos</option>';
        itens.forEach(i => { if(i) s.innerHTML += '<option>'+i+'</option>'; });
      };
      f('f_mod', 'modalidade');
      f('f_cat', 'categoria');
      f('f_ent', 'entidade');
      f('f_cid', 'municipio');
      f('f_rt', 'rt');
      f('f_status', 'status');
    }

    function limparFiltros() {
      document.querySelectorAll('select').forEach(s => s.value = "");
      atualizarGraficos();
    }

    function atualizarGraficos() {
      var f = {
        mod: document.getElementById('f_mod').value,
        cat: document.getElementById('f_cat').value,
        ent: document.getElementById('f_ent').value,
        cid: document.getElementById('f_cid').value,
        rt: document.getElementById('f_rt').value,
        st: document.getElementById('f_status').value
      };

      var filtrados = DADOS_GLOBAIS.filter(d => {
        return (!f.mod || d.modalidade == f.mod) &&
               (!f.cat || d.categoria == f.cat) && 
               (!f.ent || d.entidade == f.ent) &&
               (!f.cid || d.municipio == f.cid) &&
               (!f.rt || d.rt == f.rt) &&
               (!f.st || d.status == f.st);
      });

      document.getElementById('kpi_total').innerText = filtrados.length.toLocaleString('pt-BR');
      document.getElementById('kpi_ent').innerText = [...new Set(filtrados.map(d => d.entidade))].length;
      document.getElementById('kpi_conf').innerText = filtrados.filter(d => d.status.includes("CONFIRMA")).length;
      document.getElementById('kpi_esp').innerText = filtrados.filter(d => d.status.includes("ESPERA")).length;
      document.getElementById('kpi_sup').innerText = filtrados.filter(d => d.status.includes("SUPLENTE")).length;
      
      desenharColuna(filtrados, 'DECLAMACAO', 'Declamação', 'g_declamacao');
      desenharColuna(filtrados, 'VOCAL', 'Intérprete Vocal', 'g_vocal');
      desenharColuna(filtrados, 'TRADICIONAL', 'Danças Tradicionais (Par)', 'g_tradicional');
      desenharColuna(filtrados, 'PIX', 'Grupos de Danças', 'g_grupo');
    }

    function desenharColuna(dados, aba, titulo, idDiv) {
      var sub = dados.filter(d => d.abaOriginal === aba);
      var agrupar = {};
      sub.forEach(d => { agrupar[d.categoria] = (agrupar[d.categoria] || 0) + 1; });

      var raw = [['Cat', 'Qtd', {role:'style'}]];
      var chavesOrdenadas = Object.keys(agrupar).sort((a,b) => agrupar[b] - agrupar[a]);
      chavesOrdenadas.forEach(k => raw.push([k, agrupar[k], '#2e7d32']));

      var data = google.visualization.arrayToDataTable(raw.length > 1 ? raw : [['Cat','Qtd'],['Sem dados',0]]);
      var options = {
        title: titulo,
        legend: 'none',
        chartArea: {width: '80%', height: '60%'},
        hAxis: {slantedText: true, slantedTextAngle: 15, textStyle: {fontSize: 9}},
        vAxis: {textStyle: {fontSize: 9}, format: '0'}
      };
      new google.visualization.ColumnChart(document.getElementById(idDiv)).draw(data, options);
    }
  </script>
</body>
</html>
